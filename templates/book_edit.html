{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">
    Редактирование книги
</h2>

<form method="post"
      enctype="multipart/form-data">

    {{ form.hidden_tag() }}

    {% set show_cover = True %}
    {% include "book_form.html" %}

    <button
        type="submit"
        class="btn btn-primary">

        Сохранить

    </button>

    <a
        href="{{ url_for('books.detail', book_id=book.id) }}"
        class="btn btn-secondary">

        Отмена

    </a>

</form>

{% endblock %}
