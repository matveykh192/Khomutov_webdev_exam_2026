{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card">

            <div class="card-header">
                Вход в систему
            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            Логин
                        </label>

                        <input
                            type="text"
                            name="login"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Пароль
                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required>

                    </div>

                    <div class="form-check mb-3">

                        <input
                            class="form-check-input"
                            type="checkbox"
                            name="remember">

                        <label class="form-check-label">
                            Запомнить меня
                        </label>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary">

                        Войти

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
